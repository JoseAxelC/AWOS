<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>2FA - Verificación</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#1e3c72;
}

button{
    background:#2a5298;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1e3c72;
}

input{
    width:90%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
}

img{
    margin-top:15px;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🔐 2FA</h1>

<div id="inicio">
    <button onclick="generarQR()">Activar 2FA</button>
</div>

<div id="qrBox" style="display:none;">
    <h3>Escanea el QR</h3>
    <img id="qr" width="200">

    <input type="text" id="token" placeholder="Código de 6 dígitos">
    <button onclick="verificar()">Verificar</button>
</div>

<p id="mensaje"></p>

</div>

<script>

async function generarQR(){
    const res = await fetch("/auth/generar");
    const data = await res.json();

    document.getElementById("inicio").style.display = "none";
    document.getElementById("qrBox").style.display = "block";

    document.getElementById("qr").src = data.qr;
}

async function verificar(){
    const token = document.getElementById("token").value;

    const res = await fetch("/auth/verificar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ token })
    });

    const data = await res.json();

    const msg = document.getElementById("mensaje");

    if(data.success){
        msg.textContent = "✅ Código correcto";
        msg.className = "success";
    }else{
        msg.textContent = "❌ Código incorrecto";
        msg.className = "error";
    }
}

</script>

</body>
</html>
