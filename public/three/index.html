<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HDR Viewer 360 Pro</title>

<style>
body { margin: 0; overflow: hidden; cursor: grab; }
body:active { cursor: grabbing; }
</style>

<!-- Import Map -->
<script type="importmap">
{
  "imports": {
    "three": "/three/build/three.module.js"
  }
}
</script>

</head>
<body>

<script type="module">

import * as THREE from "three";
import { RGBELoader } from "/three/examples/jsm/loaders/RGBELoader.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 0, 1);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// PMREM
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// ✅ Cargar HDR correctamente
const loader = new RGBELoader();

loader.load(
  "miHDR.hdr",   // 👈 IMPORTANTE: ruta correcta
  function(texture) {

    texture.mapping = THREE.EquirectangularReflectionMapping;

    const envMap = pmremGenerator.fromEquirectangular(texture).texture;

    scene.environment = envMap;
    scene.background = texture;

    texture.dispose();
    pmremGenerator.dispose();
  },
  undefined,
  function(error){
    console.error("Error cargando HDR:", error);
  }
);


// 🎮 Control 360 con mouse
let isDragging = false;
let prevX = 0;
let prevY = 0;

let rotationY = 0;
let rotationX = 0;

window.addEventListener("mousedown", (e) => {
    isDragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
});

window.addEventListener("mouseup", () => {
    isDragging = false;
});

window.addEventListener("mouseleave", () => {
    isDragging = false;
});

window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    const deltaX = e.clientX - prevX;
    const deltaY = e.clientY - prevY;

    prevX = e.clientX;
    prevY = e.clientY;

    rotationY += deltaX * 0.005;
    rotationX += deltaY * 0.005;

    rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
});


// Animación
function animate() {
    requestAnimationFrame(animate);

    scene.environmentRotation.set(rotationX, rotationY, 0);
    scene.backgroundRotation.set(rotationX, rotationY, 0);

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
