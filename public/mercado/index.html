<!DOCTYPE html>
<html>
<head>
  <title>Tienda Java</title>
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    .productos {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .producto {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background: #009ee3;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }

    .carrito {
      margin-top: 40px;
      background: white;
      padding: 20px;
      width: 400px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h1>🛒 Tienda de Programación</h1>

  <div class="productos">
    <div class="producto">
      <h3>Curso Java</h3>
      <p>$100 MXN</p>
      <button onclick="agregar('Curso Java', 100)">Agregar</button>
    </div>

    <div class="producto">
      <h3>Curso Spring</h3>
      <p>$150 MXN</p>
      <button onclick="agregar('Curso Spring', 150)">Agregar</button>
    </div>

    <div class="producto">
      <h3>Curso APIs</h3>
      <p>$200 MXN</p>
      <button onclick="agregar('Curso APIs', 200)">Agregar</button>
    </div>
  </div>

  <div class="carrito">
    <h2>🧾 Carrito</h2>
    <ul id="lista"></ul>
    <h3>Total: $<span id="total">0</span> MXN</h3>
    <button onclick="pagar()">Pagar</button>
  </div>

<script>
let carrito = [];
let total = 0;

function agregar(nombre, precio) {
  carrito.push({
    title: nombre,
    quantity: 1,
    unit_price: precio,
    currency_id: "MXN"
  });

  total += precio;
  actualizarCarrito();
}

function actualizarCarrito() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrito.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.title + " - $" + item.unit_price;
    lista.appendChild(li);
  });

  document.getElementById("total").textContent = total;
}

async function pagar() {

  if(carrito.length === 0){
    alert("Agrega productos al carrito");
    return;
  }

  const response = await fetch("/crear-preferencia", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items: carrito })
  });

  const data = await response.json();

  const mp = new MercadoPago("TEST-9f0a560f-b0bd-466e-9fc3-ec85269dcb41", {
    locale: 'es-MX'
  });

  mp.checkout({
    preference: {
      id: data.id
    },
    autoOpen: true
  });
}
</script>

</body>
</html>
