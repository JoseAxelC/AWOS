<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Proyectos</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#1f2937;
    color:white;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

/* LINKS */
.menu-item{
    position:relative;
}

.menu-item a{
    display:block;
    padding:15px 20px;
    color:white;
    text-decoration:none;
}

.menu-item a:hover{
    background:#374151;
}

/* SUBMENU */
.submenu{
    display:none;
    position:absolute;
    left:240px;
    top:0;
    background:#111827;
    min-width:150px;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.submenu a{
    display:block;
    padding:10px;
    color:white;
    text-decoration:none;
}

.submenu a:hover{
    background:#374151;
}

/* SHOW MENU */
.menu-item:hover .submenu{
    display:block;
}

/* CONTENT */
.content{
    flex:1;
    background:#f4f6f9;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>
