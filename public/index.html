<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Proyectos</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
}

/* Panel izquierdo */
.sidebar{
    width:220px;
    background:#1f2937;
    color:white;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    padding:15px 20px;
    color:white;
    text-decoration:none;
}

.sidebar a:hover{
    background:#374151;
}

/* Panel derecho */
.content{
    flex:1;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Proyectos</h2>


<a href="/Geo" target="visor">Geo Actividad</a>
<a href="/Red" target="visor">Redes Actividad</a>
<a href="/streaming" target="visor">Streaming</a>
<a href="/chat" target="visor">IA Java</a>
<a href="/tienda" target="visor">Tienda</a>
<a href="/three" target="visor">ThreeJS</a>
<a href="/auth" target="visor">2FA</a>
<a href="/mercado" target="visor">Mercado Pago</a>
    
</div>

<div class="content">
<iframe name="visor"></iframe>
</div>

</body>
